<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slime Me Out</title>
  </head>
  <body>
    <div id="app">
      <div id="game-container">
        <!-- Background -->
        <div id="background"></div>
        
        <!-- Header / Stats -->
        <header id="header">
          <div class="header-left">
            <h1>Slime Me Out</h1>
            <div class="header-actions">
              <button id="prestige-btn" class="hidden">
                <span id="prestige-btn-text">Ascend (Prestige)</span>
                <div class="shine"></div>
              </button>
              <button id="travel-btn" class="hidden">
                <span id="travel-btn-text">Travel</span>
                <div class="shine"></div>
              </button>
            </div>
          </div>
          <div class="stats">
            <div class="stat-pill prestige-stat hidden" id="souls-container">
              <div class="stat-icon soul-icon">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                  <path d="M12 2l3 7 7 3-7 3-3 7-3-7-7-3 7-3z"/>
                </svg>
              </div>
              <div class="stat-content">
                <span class="stat-label">Slime Souls</span>
                <span id="souls-amount" class="stat-value text-purple glow-purple">0</span>
              </div>
            </div>
            
            <div class="stat-pill">
              <div class="stat-icon goo-icon">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                  <path d="M12 2C8 9.5 5 13.5 5 17c0 3.866 3.134 7 7 7s7-3.134 7-7c0-3.5-3-7.5-7-15z"/>
                </svg>
              </div>
              <div class="stat-content">
                <span class="stat-label">Goo</span>
                <span id="goo-amount" class="stat-value glow-green">0</span>
              </div>
            </div>
            
            <div class="stat-pill">
              <div class="stat-icon rate-icon">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                  <path d="M13 3v8h8L11 21v-8H3l10-10z"/>
                </svg>
              </div>
              <div class="stat-content">
                <span class="stat-label">Goo/sec</span>
                <span id="goo-per-sec" class="stat-value">0</span>
              </div>
            </div>
          </div>
        </header>

        <!-- Main Click Area -->
        <main id="main-area">
          <div id="slime-container">
            <img src="/slime_transparent.png" id="slime" alt="Click the slime!" draggable="false" />
            <div id="floating-numbers-container"></div>
          </div>
          
          <!-- Companions Area -->
          <div id="companions-container"></div>
        </main>

        <!-- Sidebar / Shop & Upgrades -->
        <aside id="sidebar">
          <div class="tabs">
            <button class="tab-btn active" data-tab="generators">Generators</button>
            <button class="tab-btn" data-tab="upgrades">Upgrades</button>
            <button class="tab-btn hidden" id="skill-tree-tab-btn" data-tab="skills">Skills</button>
          </div>
          
          <div id="generators-tab" class="tab-content active"></div>
          <div id="upgrades-tab" class="tab-content"></div>
          <div id="skills-tab" class="tab-content"></div>
        </aside>

        <!-- Dialogue System -->
        <div id="dialogue-box" class="hidden glass-panel">
          <img src="/slime_transparent.png" id="dialogue-portrait" alt="Speaker" />
          <div id="dialogue-content">
            <div id="dialogue-text"></div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
